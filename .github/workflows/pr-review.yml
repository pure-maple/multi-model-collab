# Automated PR review pipeline
# Layer 1: CI tests (existing ci.yml)
# Layer 2: CodeRabbit AI (auto-triggered via GitHub App)
# Layer 3: Codex code review (this workflow)

name: PR Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/main..HEAD -- '*.py' | head -20)
          {
            echo "files<<EOFILES"
            echo "$FILES"
            echo "EOFILES"
          } >> "$GITHUB_OUTPUT"
          echo "Changed Python files:"
          echo "$FILES"

      - name: Generate diff summary
        id: diff
        run: |
          DIFF=$(git diff origin/main..HEAD -- '*.py' | head -500)
          echo "diff<<EODIFF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EODIFF" >> $GITHUB_OUTPUT

      # Codex review via OpenAI API (uses repository secret OPENAI_API_KEY)
      - name: Codex review
        if: env.OPENAI_API_KEY != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEW=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-4o",
              "messages": [
                {"role": "system", "content": "You are a senior Python code reviewer for modelmux, an MCP server project. Review the diff for: security issues, logic bugs, missing error handling, test coverage gaps. Be concise. Use Chinese. Only flag real issues."},
                {"role": "user", "content": "Review this PR diff:\n\n${{ steps.diff.outputs.diff }}"}
              ],
              "max_tokens": 1000
            }' | jq -r '.choices[0].message.content // "Review unavailable"')

          # Post review as PR comment
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## Codex Review

          $REVIEW

          ---
          *Automated review by GPT-4o via GitHub Actions*"
